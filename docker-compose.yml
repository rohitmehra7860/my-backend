services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_backend_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - my_backend_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: my_backend_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - my_backend_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: my_backend_mysql
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: my_backend
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my_backend_network

  redis:
    image: redis:alpine
    container_name: my_backend_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - my_backend_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: my_backend_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: laravel
      PMA_PASSWORD: secret
    networks:
      - my_backend_network
    depends_on:
      - mysql

networks:
  my_backend_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
